<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ok Translator Team</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ok-cream: #FFFCF4;
      --ok-ink: #1a1814;
      --ok-muted: #6b6860;
      --ok-border: rgba(26,24,20,0.15);
      --ok-border-strong: rgba(26,24,20,0.3);
      --ok-accent: #117F19;
      --ok-accent-light: #eaf5eb;
      --ok-pending: #854F0B;
      --ok-pending-light: #FAEEDA;
    }
    body { background: var(--ok-cream); font-family: Georgia, 'Times New Roman', serif; color: var(--ok-ink); }
    .app { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .header { border-bottom: 1px solid var(--ok-border-strong); padding-bottom: 1.5rem; margin-bottom: 2rem; display: flex; align-items: baseline; justify-content: space-between; }
    .header-left h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .header-left p { font-size: 12px; color: var(--ok-muted); font-family: monospace; margin-top: 4px; letter-spacing: 0.04em; }
    .gate { min-height: 420px; display: flex; align-items: center; justify-content: center; }
    .gate-card { background: white; border: 0.5px solid var(--ok-border); border-radius: 4px; padding: 2.5rem 2rem; width: 320px; text-align: center; }
    .gate-card h2 { font-size: 20px; margin-bottom: 6px; }
    .gate-card p { font-size: 12px; color: var(--ok-muted); margin-bottom: 1.5rem; font-family: monospace; }
    .gate-card input { width: 100%; padding: 10px 12px; border: 0.5px solid var(--ok-border-strong); border-radius: 2px; font-family: monospace; font-size: 14px; background: var(--ok-cream); margin-bottom: 10px; }
    .gate-card input:focus { outline: none; border-color: var(--ok-ink); }
    .gate-card button { width: 100%; padding: 10px; background: var(--ok-ink); color: var(--ok-cream); border: none; border-radius: 2px; font-family: Georgia, serif; font-size: 14px; cursor: pointer; }
    .gate-card button:hover { background: #333; }
    .gate-error { font-size: 12px; color: #cc3300; font-family: monospace; margin-top: 8px; }
    .submissions { display: none; }
    .submissions.active { display: block; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { font-family: monospace; font-size: 11px; padding: 4px 12px; border: 0.5px solid var(--ok-border-strong); border-radius: 2px; background: transparent; color: var(--ok-muted); cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover, .filter-btn.active { background: var(--ok-ink); color: var(--ok-cream); border-color: var(--ok-ink); }
    .refresh-btn { font-family: monospace; font-size: 11px; padding: 4px 12px; border: 0.5px solid var(--ok-border-strong); border-radius: 2px; background: transparent; color: var(--ok-muted); cursor: pointer; }
    .refresh-btn:hover { background: var(--ok-ink); color: var(--ok-cream); border-color: var(--ok-ink); }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--ok-border-strong); }
    th { font-family: monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ok-muted); padding: 0 12px 10px 0; text-align: left; font-weight: 400; }
    tbody tr { border-bottom: 0.5px solid var(--ok-border); cursor: pointer; transition: background 0.1s; }
    tbody tr:hover { background: rgba(17,127,25,0.04); }
    td { padding: 14px 12px 14px 0; vertical-align: top; font-size: 14px; }
    td.title { font-weight: 700; font-size: 15px; }
    td.pitch { color: var(--ok-muted); font-size: 13px; max-width: 260px; line-height: 1.5; font-style: italic; }
    td.lang { font-family: monospace; font-size: 11px; color: var(--ok-muted); }
    .status-pill { display: inline-block; font-family: monospace; font-size: 10px; padding: 3px 8px; border-radius: 2px; letter-spacing: 0.05em; }
    .status-open { background: var(--ok-accent-light); color: var(--ok-accent); }
    .status-pending { background: var(--ok-pending-light); color: var(--ok-pending); }
    .status-claimed { background: #F0F0F0; color: var(--ok-muted); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,24,20,0.6); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--ok-cream); border-radius: 4px; width: 580px; max-width: 95vw; max-height: 88vh; overflow-y: auto; padding: 2rem; position: relative; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ok-muted); line-height: 1; }
    .modal-close:hover { color: var(--ok-ink); }
    .modal h2 { font-size: 22px; margin-bottom: 6px; }
    .modal-meta { font-family: monospace; font-size: 11px; color: var(--ok-muted); margin-bottom: 1.25rem; display: flex; gap: 16px; flex-wrap: wrap; }
    .modal-pitch { font-style: italic; font-size: 14px; line-height: 1.7; color: var(--ok-ink); border-left: 2px solid var(--ok-border-strong); padding-left: 14px; margin-bottom: 1.5rem; }
    .modal-section { margin-bottom: 1.25rem; }
    .modal-section-title { font-family: monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ok-muted); margin-bottom: 8px; }
    .interest-list { margin-bottom: 1.25rem; }
    .interest-item { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 0.5px solid var(--ok-border); font-size: 13px; flex-wrap: wrap; gap: 4px; }
    .interest-item:last-child { border-bottom: none; }
    .interest-name { font-weight: 700; }
    .interest-deadline { font-family: monospace; font-size: 11px; color: var(--ok-muted); }
    .interest-form { background: white; border: 0.5px solid var(--ok-border); border-radius: 4px; padding: 1.25rem; margin-top: 1rem; }
    .interest-form h3 { font-size: 15px; margin-bottom: 1rem; }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-family: monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ok-muted); margin-bottom: 5px; }
    .form-row input { width: 100%; padding: 8px 10px; border: 0.5px solid var(--ok-border-strong); border-radius: 2px; font-family: Georgia, serif; font-size: 13px; background: var(--ok-cream); }
    .form-row input:focus { outline: none; border-color: var(--ok-ink); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .submit-btn { width: 100%; padding: 10px; background: var(--ok-accent); color: white; border: none; border-radius: 2px; font-family: Georgia, serif; font-size: 13px; cursor: pointer; margin-top: 4px; }
    .submit-btn:hover { background: #0d6614; }
    .submit-btn:disabled { background: var(--ok-muted); cursor: not-allowed; }
    .pdf-link { display: inline-flex; align-items: center; gap: 6px; font-family: monospace; font-size: 12px; color: var(--ok-accent); text-decoration: none; border: 0.5px solid var(--ok-accent); padding: 6px 12px; border-radius: 2px; margin-bottom: 1.25rem; }
    .pdf-link:hover { background: var(--ok-accent-light); }
    .empty-state { text-align: center; padding: 3rem; color: var(--ok-muted); font-style: italic; font-size: 14px; }
    .already-msg { background: var(--ok-pending-light); color: var(--ok-pending); font-family: monospace; font-size: 12px; padding: 10px 12px; border-radius: 2px; margin-top: 10px; }
    .loading { text-align: center; padding: 3rem; color: var(--ok-muted); font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-left">
        <h1>Ok Translator Team</h1>
        <p>submission board / translator access</p>
      </div>
    </div>

    <div class="gate" id="gate">
      <div class="gate-card">
        <h2>Translator Access</h2>
        <p>enter your team code to continue</p>
        <input type="password" id="code-input" placeholder="team code" />
        <button onclick="checkCode()">Enter</button>
        <div class="gate-error" id="gate-error"></div>
      </div>
    </div>

    <div class="submissions" id="submissions">
      <div class="top-bar">
        <div class="filters">
          <button class="filter-btn active" onclick="filterStatus('all', this)">All</button>
          <button class="filter-btn" onclick="filterStatus('Open', this)">Open</button>
          <button class="filter-btn" onclick="filterStatus('Pending', this)">Pending</button>
          <button class="filter-btn" onclick="filterStatus('Claimed', this)">Claimed</button>
          <button class="filter-btn" onclick="filterStatus('Closed', this)">Closed</button>
        </div>
        <button class="refresh-btn" onclick="loadSubmissions()">↻ Refresh</button>
      </div>
      <div id="table-container"><div class="loading">Loading submissions...</div></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    const TEAM_CODE = "writeoktranslations";
    let PROXY_URL = "";

    let allSubmissions = [];
    let allInterests = [];
    let currentFilter = "all";
    let currentTranslator = null;

    async function airtable(path, method = "GET", body = null) {
      const res = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path, method, body: body ? JSON.stringify(body) : null }),
      });
      return res.json();
    }

    function checkCode() {
      const val = document.getElementById("code-input").value.trim();
      if (val === TEAM_CODE) {
        document.getElementById("gate").style.display = "none";
        document.getElementById("submissions").classList.add("active");
        loadSubmissions();
      } else {
        document.getElementById("gate-error").textContent = "incorrect code — try again";
      }
    }
    document.getElementById("code-input").addEventListener("keydown", e => { if (e.key === "Enter") checkCode(); });

    async function loadSubmissions() {
      document.getElementById("table-container").innerHTML = '<div class="loading">Loading submissions...</div>';
      try {
        const [subData, intData] = await Promise.all([
          airtable("Submissions?view=Grid%20view"),
          airtable("Interests?view=Grid%20view"),
        ]);
        if (subData.error) throw new Error(subData.error.message);
        allSubmissions = subData.records || [];
        allInterests = intData.records || [];
        renderTable();
      } catch (err) {
        document.getElementById("table-container").innerHTML =
          `<div class="loading">Could not load submissions. Please try refreshing.<br><small>${err.message}</small></div>`;
      }
    }

    function statusPill(status) {
      const s = status || "Open";
      const classes = { Open: "status-open", Pending: "status-pending", Claimed: "status-claimed", Closed: "status-claimed" };
      return `<span class="status-pill ${classes[s] || "status-open"}">${s}</span>`;
    }

    function renderTable() {
      const filtered = allSubmissions.filter(s =>
        currentFilter === "all" || (s.fields.Status || "Open") === currentFilter
      );
      if (filtered.length === 0) {
        document.getElementById("table-container").innerHTML = '<div class="empty-state">No submissions match this filter.</div>';
        return;
      }
      const rows = filtered.map(s => {
        const f = s.fields;
        const pitch = (f.Pitch || "").slice(0, 80) + ((f.Pitch || "").length > 80 ? "…" : "");
        return `<tr onclick="openModal('${s.id}')">
          <td class="title">${f.Title || "—"}</td>
          <td class="pitch">${pitch || "—"}</td>
          <td class="lang">${f["From Language"] || "—"}</td>
          <td class="lang">${f["To Language"] || "Open"}</td>
          <td>${statusPill(f.Status)}</td>
        </tr>`;
      }).join("");
      document.getElementById("table-container").innerHTML = `
        <table>
          <thead><tr>
            <th>Title</th><th>Pitch</th><th>From</th><th>Into</th><th>Status</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function filterStatus(status, btn) {
      currentFilter = status;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderTable();
    }

    function openModal(id) {
      const s = allSubmissions.find(x => x.id === id);
      if (!s) return;
      const f = s.fields;
      const myInterests = allInterests.filter(i => i.fields.Submission === f.Title);
      const alreadyInterested = currentTranslator && myInterests.some(i => i.fields["Translator Email"] === currentTranslator.email);

      const interestList = myInterests.length > 0
        ? myInterests.map(i => {
            const acc = i.fields.Accepted || "Pending";
            const cls = acc === "Accepted" ? "status-open" : acc === "Declined" ? "status-claimed" : "status-pending";
            return `<div class="interest-item">
              <span class="interest-name">${i.fields["Translator Name"] || "—"}</span>
              <span class="interest-deadline">deadline: ${i.fields.Deadline || "—"}</span>
              <span class="status-pill ${cls}">${acc}</span>
            </div>`;
          }).join("")
        : '<p style="font-size:13px; color:var(--ok-muted); font-style:italic;">No interest marked yet.</p>';

      const formOrMsg = f.Status === "Closed"
        ? `<div class="already-msg">This piece is closed and no longer accepting translators.</div>`
        : alreadyInterested
        ? `<div class="already-msg">You have already marked interest in this piece.</div>`
        : `<div class="interest-form">
            <h3>Mark your interest</h3>
            <div class="form-grid">
              <div class="form-row"><label>Your name</label><input type="text" id="f-name" placeholder="Full name" /></div>
              <div class="form-row"><label>Your email</label><input type="email" id="f-email" placeholder="email@ok.com" /></div>
            </div>
            <div class="form-row"><label>Expected translation deadline</label><input type="text" id="f-deadline" placeholder="e.g. June 30, 2025" /></div>
            <button class="submit-btn" id="submit-btn" onclick="submitInterest('${id}', '${f.Title.replace(/'/g, "\\'")}')">Mark interest →</button>
            <div id="form-msg"></div>
          </div>`;

      document.getElementById("modal-content").innerHTML = `
        <div style="margin-bottom:6px; display:flex; align-items:center; gap:10px;">
          ${statusPill(f.Status)}
          <span style="font-family:monospace; font-size:11px; color:var(--ok-muted);">by ${f.Author || "—"}</span>
        </div>
        <h2>${f.Title || "—"}</h2>
        <div class="modal-meta"><span>from: ${f["From Language"] || "—"}</span><span>into: ${f["To Language"] || "Open"}</span></div>
        <div class="modal-pitch">${f.Pitch || ""}</div>
        ${f["PDF Link"] ? `<a class="pdf-link" href="${f["PDF Link"]}" target="_blank">↗ Read the full PDF</a>` : ""}
        ${f["Notes"] ? `<div class="modal-section"><div class="modal-section-title">Editor's Notes:</div><div style="font-size:14px; line-height:1.7;">${f["Notes"]}</div></div>` : ""}
        <div class="modal-section">
          <div class="modal-section-title">Translator interest (${myInterests.length})</div>
          <div class="interest-list">${interestList}</div>
        </div>
        ${formOrMsg}`;
      document.getElementById("modal-overlay").classList.add("open");
    }

    async function submitInterest(submissionId, submissionTitle) {
      const name = (document.getElementById("f-name").value || "").trim();
      const email = (document.getElementById("f-email").value || "").trim();
      const deadline = (document.getElementById("f-deadline").value || "").trim();
      const msgEl = document.getElementById("form-msg");
      const btn = document.getElementById("submit-btn");
      if (!name || !email || !deadline) {
        msgEl.innerHTML = '<div class="already-msg">Please fill in all fields.</div>';
        return;
      }
      btn.disabled = true;
      btn.textContent = "Submitting...";
      try {
        const data = await airtable("Interests", "POST", {
          fields: {
            Submission: submissionTitle,
            "Translator Name": name,
            "Translator Email": email,
            Deadline: deadline,
            Accepted: "Pending",
          },
        });
        if (data.error) throw new Error(data.error.message);
        const sub = allSubmissions.find(x => x.id === submissionId);
        if (sub && (sub.fields.Status === "Open" || !sub.fields.Status)) {
          await airtable(`Submissions/${submissionId}`, "PATCH", { fields: { Status: "Pending" } });
          sub.fields.Status = "Pending";
        }
        allInterests.push(data);
        currentTranslator = { name, email };
        renderTable();
        openModal(submissionId);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Mark interest →";
        msgEl.innerHTML = `<div class="already-msg">Something went wrong: ${err.message}</div>`;
      }
    }

    function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); }
    function closeModalOutside(e) { if (e.target === document.getElementById("modal-overlay")) closeModal(); }
  </script>
</body>
</html>
